<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CERIDWEN</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* 🌈 Neon bg + mouse glow */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at var(--x,50%) var(--y,50%), #ff00ff33, transparent 40%);
  z-index:-2;
  transition:0.1s;
}

/* ⭐ stars */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* Title */
h1{
  text-align:center;
  margin-top:40px;
  font-size:60px;
  color:#ff00ff;
  text-shadow:0 0 40px #ff00ff;
}

/* 🚀 Discord */
.discord{
  display:block;
  margin:20px auto;
  padding:12px 30px;
  border-radius:30px;
  background:linear-gradient(45deg,#5865F2,#8ea1ff);
  color:white;
  text-decoration:none;
  box-shadow:0 0 20px #5865F2;
  animation:pulse 2s infinite;
  width:fit-content;
}

@keyframes pulse{
  0%{box-shadow:0 0 10px #5865F2;}
  50%{box-shadow:0 0 40px #5865F2;}
  100%{box-shadow:0 0 10px #5865F2;}
}

/* search */
.search{
  display:flex;
  justify-content:center;
  margin:20px;
}

.search input{
  width:400px;
  padding:12px;
  border-radius:30px;
  border:none;
  background:#111;
  color:white;
}

/* grid */
.grid{
  padding:40px;
  margin:40px;
}

/* 🎴 TRIPWHITE style card */
.card{
  display:flex;
  align-items:center;
  justify-content:space-between;

  background:rgba(20,20,20,0.9);
  padding:15px 20px;
  border-radius:20px;
  margin-bottom:15px;

  box-shadow:0 0 20px rgba(255,0,255,0.2);
  transition:0.2s;

  transform-style:preserve-3d;
  animation:slide 0.6s ease;
}

/* hover glow */
.card:hover{
  box-shadow:0 0 40px #ff00ff;
}

/* slide */
@keyframes slide{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* left */
.left{
  display:flex;
  align-items:center;
  gap:15px;
}

/* avatar */
.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
}

/* name */
.name{
  font-size:18px;
}

/* facebook button */
.fb{
  padding:8px 16px;
  border-radius:20px;
  background:#1877f2;
  color:white;
  text-decoration:none;
  box-shadow:0 0 10px #1877f2;
}

.fb:hover{
  background:#0d5ed7;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>CERIDWEN</h1>

<a href="https://discord.gg/YOUR_INVITE" class="discord" target="_blank">
🚀 เข้าร่วม Discord
</a>

<div class="search">
  <input id="search" placeholder="ค้นหา...">
</div>

<div id="list" class="grid"></div>

<audio id="music" src="music.mp3" loop></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCr42iK2m6dwxqO2ZEFTIicDSWawb8m5ck",
  authDomain:"ceridwen-7701e.firebaseapp.com",
  projectId:"ceridwen-7701e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");
const search = document.getElementById("search");

let members=[];

onSnapshot(collection(db,"members"), snap=>{
  members=[];
  snap.forEach(d=>members.push(d.data()));
  render(members);
});

function render(arr){
  list.innerHTML="";
  arr.forEach(u=>{
    list.innerHTML+=`
    <div class="card">
      <div class="left">
        <img class="avatar" src="${u.image || 'https://via.placeholder.com/60'}">
        <div class="name">${u.name}</div>
      </div>
      <a class="fb" href="${u.facebook}" target="_blank">Facebook</a>
    </div>`;
  });

  enable3D(); // 🎴 enable tilt
}

/* 🔎 search */
search.addEventListener("input",()=>{
  const v=search.value.toLowerCase();
  render(members.filter(m=>m.name.toLowerCase().includes(v)));
});

/* 🎴 3D tilt */
function enable3D(){
  document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("mousemove",e=>{
      const rect=card.getBoundingClientRect();
      const x=e.clientX-rect.left;
      const y=e.clientY-rect.top;

      const rotateX=-(y-rect.height/2)/10;
      const rotateY=(x-rect.width/2)/10;

      card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    card.addEventListener("mouseleave",()=>{
      card.style.transform="rotateX(0) rotateY(0)";
    });
  });
}

/* 🎵 music */
document.body.onclick=()=>{
  document.getElementById("music").play();
};
</script>

<!-- ⭐ stars -->
<script>
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let stars=Array.from({length:120},()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  r:Math.random()*2
}));

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  stars.forEach(s=>{
    s.y+=0.4;
    if(s.y>c.height)s.y=0;

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

/* 🌈 mouse glow */
document.addEventListener("mousemove",e=>{
  document.body.style.setProperty('--x', e.clientX+'px');
  document.body.style.setProperty('--y', e.clientY+'px');
});
</script>

</body>
</html>
