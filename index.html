<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>CERIDWEN</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 40px;
      text-shadow: 0 0 20px purple;
    }

    .box {
      margin: 30px auto;
      padding: 20px;
      width: 300px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      box-shadow: 0 0 20px purple;
    }

    input {
      width: 80%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: purple;
      color: white;
      cursor: pointer;
    }

    .list {
      margin-top: 20px;
    }

    .item {
      background: rgba(255,255,255,0.1);
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>CERIDWEN</h1>

<div class="box">
  <input id="nameInput" placeholder="ใส่ชื่อของคุณ">
  <br>
  <button onclick="saveToFirebase()">บันทึก</button>

  <div class="list" id="list"></div>
</div>

<script type="module">
  // 🔥 import firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    orderBy,
    query
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  // 🔥 config ของคุณ
  const firebaseConfig = {
    apiKey: "AIzaSyCr42iK2m6dwxqO2ZEFTIicDSWawb8m5ck",
    authDomain: "ceridwen-7701e.firebaseapp.com",
    projectId: "ceridwen-7701e",
    storageBucket: "ceridwen-7701e.firebasestorage.app",
    messagingSenderId: "1016625949342",
    appId: "1:1016625949342:web:e11a12029ffae769f1298f",
    measurementId: "G-GK11X4EL0S"
  };

  // 🔥 เริ่มต้น
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔥 บันทึกข้อมูล
  window.saveToFirebase = async () => {
    const name = document.getElementById("nameInput").value;

    if (!name) {
      alert("กรอกชื่อก่อน!");
      return;
    }

    await addDoc(collection(db, "members"), {
      name: name,
      time: new Date()
    });

    document.getElementById("nameInput").value = "";
    loadData();
  };

  // 🔥 ดึงข้อมูลมาแสดง
  async function loadData() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const q = query(collection(db, "members"), orderBy("time", "desc"));
    const querySnapshot = await getDocs(q);

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "item";
      div.innerText = data.name;

      list.appendChild(div);
    });
  }

  // โหลดตอนเปิดเว็บ
  loadData();
</script>

</body>
</html>
