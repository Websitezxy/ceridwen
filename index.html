<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CERIDWEN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* BACKGROUND ANIMATION */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(108,76,255,0.2), transparent 70%);
  animation: move 10s linear infinite;
}
@keyframes move {
  0% { transform: translate(-25%, -25%); }
  50% { transform: translate(-10%, -10%); }
  100% { transform: translate(-25%, -25%); }
}

/* TITLE */
h1 {
  margin-top: 50px;
  font-size: 60px;
  letter-spacing: 8px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 25px #6c4cff; }
}

/* CARD */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 50px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 25px;
  margin: 15px;
  width: 220px;
  transition: 0.4s;
  box-shadow: 0 0 20px rgba(255,255,255,0.05);
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 40px rgba(108,76,255,0.6);
}

/* IMAGE */
.card img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.2) rotate(5deg);
}

/* BUTTON */
button {
  margin: 5px;
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.view {
  background: white;
  color: black;
}

.fb {
  background: #1877f2;
  color: white;
}

/* PROFILE */
.profile {
  display:none;
  margin: 30px auto;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 20px;
  width: 300px;
  border-radius: 20px;
}
</style>

</head>

<body>

<h1>CERIDWEN</h1>

<div class="container">

  <div class="card">
    <img src="https://i.pravatar.cc/100?img=1">
    <h3>Bank</h3>
    <button class="view" onclick="showProfile('Bank','Leader','สายบุก')">โปรไฟล์</button>
    <a href="https://facebook.com/" target="_blank">
      <button class="fb">Facebook</button>
    </a>
  </div>

  <div class="card">
    <img src="https://i.pravatar.cc/100?img=2">
    <h3>Mix</h3>
    <button class="view" onclick="showProfile('Mix','Support','สายซัพ')">โปรไฟล์</button>
    <a href="https://facebook.com/" target="_blank">
      <button class="fb">Facebook</button>
    </a>
  </div>

</div>

<div id="profileBox" class="profile"></div>

<script>
function showProfile(name, role, desc){
  document.getElementById("profileBox").style.display = "block";
  document.getElementById("profileBox").innerHTML = `
    <h2>${name}</h2>
    <p>ตำแหน่ง: ${role}</p>
    <p>${desc}</p>
  `;
}
</script>
<audio id="bgmusic" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
</body>
</html>
