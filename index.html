<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CERIDWEN</title>

<!-- icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* Title */
h1 {
  text-align: center;
  margin-top: 40px;
  font-size: 60px;
  text-shadow:
    0 0 10px #ff00ff,
    0 0 20px #ff00ff,
    0 0 40px #ff00ff;
}

/* Search */
.search {
  display: flex;
  justify-content: center;
  margin: 30px;
}

.search input {
  width: 400px;
  padding: 12px;
  border-radius: 30px;
  border: none;
  outline: none;
  background: #111;
  color: white;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px,1fr));
  gap: 30px;
  padding: 40px;
}

/* Card */
.card {
  position: relative;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  transition: 0.4s;
  animation: float 4s ease-in-out infinite;
}

/* Glow border */
.card::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 20px;
  background: linear-gradient(45deg,#ff00ff,#00ffff,#ff00ff);
  filter: blur(15px);
  opacity: 0;
  transition: 0.4s;
  z-index: -1;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow:
    0 0 20px #ff00ff,
    0 0 40px #ff00ff;
}

.card:hover::before {
  opacity: 1;
}

/* Avatar */
.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
}

/* Facebook button */
.fb-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 16px;
  border-radius: 25px;
  background: linear-gradient(45deg,#1877f2,#00c6ff);
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.fb-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #1877f2;
}

/* Float animation */
@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

/* Stars */
canvas {
  position: fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>CERIDWEN</h1>

<div class="search">
  <input type="text" id="search" placeholder="ค้นหาชื่อสมาชิก...">
</div>

<div id="member-list" class="grid"></div>

<audio id="bgmusic" src="music.mp3" loop></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyCr42iK2m6dwxqO2ZEFTIicDSWawb8m5ck",
  authDomain: "ceridwen-7701e.firebaseapp.com",
  projectId: "ceridwen-7701e",
  storageBucket: "ceridwen-7701e.firebasestorage.app",
  messagingSenderId: "1016625949342",
  appId: "1:1016625949342:web:e11a12029ffae769f1298f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("member-list");
const searchInput = document.getElementById("search");

let members = [];

/* โหลดข้อมูล realtime */
onSnapshot(collection(db, "members"), (snapshot) => {
  members = [];
  snapshot.forEach(doc => members.push(doc.data()));
  render(members);
});

/* render */
function render(data) {
  container.innerHTML = "";

  data.forEach(user => {
    if (!user.name) return;

    container.innerHTML += `
      <div class="card">
        <img src="${user.image || 'https://via.placeholder.com/80'}" class="avatar">
        <h3>${user.name}</h3>

        <a href="${user.facebook || '#'}" target="_blank" class="fb-btn">
          <i class="fab fa-facebook"></i> Facebook
        </a>
      </div>
    `;
  });
}

/* search */
searchInput.addEventListener("input", () => {
  const keyword = searchInput.value.toLowerCase();
  const filtered = members.filter(m => m.name.toLowerCase().includes(keyword));
  render(filtered);
});

/* music */
document.body.onclick = () => {
  document.getElementById("bgmusic").play();
};
</script>

<!-- ดาว -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = Array.from({length:100},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*2
}));

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  stars.forEach(s=>{
    s.y += 0.3;
    if(s.y>canvas.height) s.y=0;

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
