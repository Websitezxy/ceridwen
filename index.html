<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CERIDWEN</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* neon bg */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#ff00ff22,#000);
  z-index:-2;
}

/* stars */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-3;
}

/* logo bg */
.bg-logo{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:700px;
  opacity:0.07;
  z-index:-1;
}

/* title */
h1{
  text-align:center;
  font-size:70px;
  margin-top:40px;
  background:linear-gradient(90deg,#fff,#ff00ff,#fff);
  -webkit-background-clip:text;
  color:transparent;
  animation:glow 3s infinite;
}

@keyframes glow{
  0%,100%{filter:drop-shadow(0 0 10px #ff00ff);}
  50%{filter:drop-shadow(0 0 40px #ff00ff);}
}

/* search */
.search{
  display:flex;
  justify-content:center;
  margin:20px;
}

.search input{
  width:400px;
  padding:12px;
  border-radius:30px;
  border:none;
  background:#111;
  color:white;
}

/* discord btn */
.discord{
  display:flex;
  justify-content:center;
}

.discord a{
  padding:12px 25px;
  border-radius:30px;
  background:#5865F2;
  color:white;
  text-decoration:none;
  margin-top:10px;
  position:relative;
}

.discord a::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:30px;
  background:linear-gradient(45deg,#5865F2,#ff00ff,#00ffff);
  filter:blur(15px);
  animation:pulse 2s infinite;
  z-index:-1;
}

@keyframes pulse{
  0%{opacity:0.3;}
  50%{opacity:1;}
  100%{opacity:0.3;}
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  padding:40px;
}

/* card */
.card{
  background:#111;
  padding:20px;
  border-radius:20px;
  text-align:center;
  transition:0.2s;
  transform-style:preserve-3d;
  animation:slide 0.6s;
}

@keyframes slide{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;}
}

.card:hover{
  transform:rotateX(5deg) rotateY(5deg) scale(1.05);
  box-shadow:0 0 40px #ff00ff;
}

/* avatar */
.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
}

/* rank */
.rank{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  margin:5px;
  display:inline-block;
}

.theboss{background:gold;color:black;}
.supby{background:#00f0ff;}
.member{background:#555;}

/* fb */
.fb{
  display:inline-block;
  margin-top:10px;
  padding:8px 15px;
  border-radius:20px;
  background:linear-gradient(45deg,#1877f2,#00c6ff);
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<img src="logo.png" class="bg-logo">

<canvas id="bg"></canvas>

<h1>CERIDWEN</h1>

<div class="discord">
  <a href="https://discord.gg/YOUR_INVITE" target="_blank">🚀 เข้าร่วม Discord</a>
</div>

<div class="search">
  <input type="text" id="search" placeholder="ค้นหาชื่อ...">
</div>

<div id="list" class="grid"></div>

<audio id="music" src="music.mp3" loop></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyCr42iK2m6dwxqO2ZEFTIicDSWawb8m5ck",
  projectId:"ceridwen-7701e"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const list=document.getElementById("list");
const search=document.getElementById("search");

let data=[];

/* realtime */
onSnapshot(collection(db,"members"),snap=>{
  data=[];
  snap.forEach(d=>data.push(d.data()));
  render(data);
});

/* render */
function render(arr){
  list.innerHTML="";
  arr.forEach(u=>{
    let r="member";
    if(u.rank==="THEBOSS") r="theboss";
    if(u.rank==="SUP/BY") r="supby";

    list.innerHTML+=`
    <div class="card">
      <img src="${u.image||'https://via.placeholder.com/80'}" class="avatar">
      <div class="rank ${r}">${u.rank||'MEMBER'}</div>
      <h3>${u.name}</h3>
      <a class="fb" href="${u.facebook}" target="_blank">Facebook</a>
    </div>`;
  });
}

/* search */
search.oninput=()=>{
  let k=search.value.toLowerCase();
  render(data.filter(x=>x.name.toLowerCase().includes(k)));
};

/* music */
document.body.onclick=()=>{
  document.getElementById("music").play();
};
</script>

<script>
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<150;i++){
  stars.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    z:Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  stars.forEach(s=>{
    s.y+=s.z;
    if(s.y>c.height)s.y=0;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.z,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
